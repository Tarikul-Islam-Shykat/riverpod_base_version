name: riverpod_base
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # state management
  riverpod: ^3.0.3
  flutter_riverpod: ^3.0.3
  hooks_riverpod: ^3.0.3

  # network handling
  internet_connection_checker: ^3.0.1
  internet_connection_checker_plus: ^3.0.0
  dio: ^5.9.2

  # local storage
  flutter_secure_storage: ^10.0.0-beta.4
  shared_preferences: ^2.5.3
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.39
  path: ^1.9.1

  # font
  google_fonts: ^6.3.2

  # optimization
  flutter_image_compress: ^2.4.0
  video_compress: ^3.1.4
  cached_network_image: ^3.4.1
  lottie: ^3.3.3
  flutter_screenutil: ^5.9.3

  # functional programming
  fpdart: ^1.2.0

  # files handling
  image_picker: ^1.2.2
  file_picker: ^10.0.0
  path_provider: ^2.1.5

  # routing
  go_router: ^17.0.0

  # environment/config
  envied: ^1.3.1

  # deployment
  upgrader: ^13.4.0
  package_info_plus: ^9.0.1

  # launcher icons
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # code generation
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.3
  drift_dev: ^2.31.0
  envied_generator: ^1.3.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
