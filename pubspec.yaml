name: riverpod_base
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # state management
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  riverpod_generator: ^4.0.3
  # network handling
  internet_connection_checker_plus: ^3.0.0
  dio: ^5.9.2
  # local storage
  flutter_secure_storage: ^10.3.1
  drift: ^2.33.0
  # font
  google_fonts: ^8.1.0
  # optimization
  flutter_image_compress: ^2.4.0
  video_compress: ^3.1.4
  cached_network_image: ^3.4.1
  lottie: ^3.3.3
  # functional programming
  fpdart: ^1.2.0
  # files handling
  image_picker: ^1.2.2
  file_picker: ^3.0.4
  path_provider: ^2.1.5
  # routing
  go_router: ^17.2.3
  # code generation
  envied: ^1.3.5
  envied_generator: ^1.3.5
  # deployment
  upgrader: ^13.4.0
  package_info_plus: ^10.1.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
